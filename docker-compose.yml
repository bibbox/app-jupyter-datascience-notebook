version: '3.2'

services:
  bibbox-jupyter-tensorflow-notebook:
    image: jupyter/datascience-notebook
    container_name:  OS_api-jupyter-datascience-notebook
    restart: unless-stopped
    ports:
      -  "8888:8888"
    volumes:
      - ./api:/home/jovyan/work

    command: "start-notebook.sh --NotebookApp.token='vendetta' --NotebookApp.allow_origin='localhost:8888'"